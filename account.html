<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>NewsFlash|Account</title>
	<script src="js/jquery.js"></script>
	<script src="js/variables.js"></script>
	<script src="js/theme.js"></script>
	<script src="js/loadpage.js"></script>
	<script src="js/index.js"></script>
	<link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
	<link href="css/index.css" rel="stylesheet">
	<link rel="stylesheet" href="css/account.css">
	<script src="js/account.js"></script>
</head>
<body>
<header>
	<h1 class="header-logo"><a href="index.html">NewsFlash</a></h1>
	<div class="buttons-container">
		<button class="change-theme-button button" id="change-theme">
			<i class="ri-moon-line button-img" id="theme-icon"></i>
		</button>
	</div>
</header>
<section class="main-container">
	<aside class="page-manipulation-container">
		<div class="page-manipulation-block">
			<a href="/profile" onclick="$('#mydiv').load('profile.html'); return false" class="profile">
				<figure class="account-block">
					<i class="ri-account-circle-line img account-img"></i>
					<figcaption class="account-nickname">
						Nickname
					</figcaption>
				</figure>
			</a>
			<nav class="page-manipulation-menu">
				<i class="ri-file-edit-line new-article-img img"></i>
				<a href="/new-article" onclick="$('#mydiv').load('new-article.html'); return false" class="manipulation create-article">New Article</a>
				<br>
				<i class="ri-file-copy-2-line not-published-img img"></i>
				<a href="#" onclick="$('#mydiv').load('not-published.html'); $(body).append('<script src=js/not-published.js></script>'); return false" class="manipulation show-not-published">Not published <sup class="not-published-count">2</sup></a>
				<br>
				<i class="ri-task-line published-img img"></i>
				<a href="#" onclick="$('#mydiv').load('published.html'); return false" class="manipulation show-published">Published <sup class="published-count">2</sup></a>
				<br>
				<i class="ri-star-line fav-img img"></i>
				<a href="#" onclick="$('#mydiv').load('favourite.html'); return false" class="manipulation show-fav">Favourite <sup class="published-count">2</sup></a>

			</nav>
		</div>
	</aside>

	<div class="content" id="mydiv">
		<!--Тут будет грузиться нужный контент-->
	</div>
</section>



</body>
</html>
