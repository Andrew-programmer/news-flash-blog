
<main class="profile-main-section">
	<div class="profile-container">
		<figure class="profile-photo-container">
			<div class="image-container">
				<img src="#" alt="Authors photo" class="profile-photo">
			</div>
			<figcaption class="profile-stats">
				<div class="money-stat-container stat-container">
					<i class="ri-money-dollar-circle-line money-stat stat"></i>
					<span class="stat-text money">200</span>
				</div>
				<div class="views-stat-container stat-container">
					<i class="ri-eye-line views-stat stat"></i>
					<span class="stat-text views">200</span>
				</div>
			</figcaption>
		</figure>
		<section class="profile-info">
			<div class="profile-description info-block">
				<h1 class="profile-description-header">Information</h1>
				<ul class="author-info">
					<li class="info-punkt">Login</li>
					<li class="info-punkt real real-name">Real Name</li>
					<li class="info-punkt real real-surname">Real Surname</li>
				</ul>
			</div>

			<div class="profile-links info-block">
				<h1 class="profile-links-header">Links</h1>
				<ul class="author-links">
					<li class="info-link gmail">Gmail</li>
					<li class="info-link inst">Instagramm</li>
					<li class="info-link twitter">Twitter</li>
				</ul>
			</div>
		</section>
		<div class="about-author-block description-block"></div>

	</div>
	<div class="profile-buttons-container">
		<button class="edit-profile-button profile-button" type="button">EDIT</button>
		<button class="exit-profile-button profile-button" type="button">EXIT</button>
	</div>
</main>
