<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>NewsFlash|Sign up</title>
	<link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
	<link rel="stylesheet" href="css/sign-up-page.css">
	<link rel="stylesheet" href="css/light-theme.css" id="light-theme">
</head>
<body>
<main class="main-section">
	<p class="register-on-heading text">Register on</p>
	<h2 class="logo text"><a href="index.html">NewsFlash</a></h2>
	<form action="#" class="sign-up-form">
		<!--Login-->
		<label for="login" class="login-header form-header">Login:</label>
		<div class="input-container">
			<input type="text" name="login-field" id="login">
		</div>
		<!--Name-->
		<label for="name" class="real-name-header form-header">Real Name:</label>
		<div class="input-container">
			<input type="text" name="name-field" id="name">
		</div>
		<!--Surname-->
		<label for="surname" class="surname-header form-header">Real Surname:</label>
		<div class="input-container">
			<input type="text" name="surname-field" id="surname">
		</div>
		<!--Password-->
		<label for="password" class="password-header form-header">Password:</label>
		<div class="input-container">
			<input type="text" name="password-field" id="password">
		</div>
		<!--Repeat password-->
		<label for="repeat-password" class="repeat-password-header form-header">Repeat password:</label>
		<div class="input-container">
			<input type="text" name="repeat-password-field" id="repeat-password">
		</div>
		<button type="submit" class="register-button">REGISTER</button>
	</form>
</main>
</body>
</html>
